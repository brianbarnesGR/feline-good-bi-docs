name: Deploy BI Docs to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "config/_default/**"
      - "config.toml"
      - "hugo.toml"
  pull_request:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "config/_default/**"
      - "config.toml"
      - "hugo.toml"

  workflow_dispatch:

    

jobs:
  build_and_deploy:
    
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true

      - name: Install SWA CLI
        run: npm install -g @azure/static-web-apps-cli

      - name: Install Hugo
        run: sudo apt install hugo --extended

      - name: Build Hugo site
        run: |
           # Install Hugo modules
           hugo mod 
           # Minify the supported output formats
           hugo --minify

      - name: Deploy with SWA CLI
        env:
           AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FIELD_0E3C5FD0F }}
        run: |
           swa deploy ./public --env production

