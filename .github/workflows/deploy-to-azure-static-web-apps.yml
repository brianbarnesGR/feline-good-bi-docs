name: Deploy BI Docs to Azure Static Web Apps

on:
  push:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "config/_default/**"
      - "config.toml"
      - "hugo.toml"
  pull_request:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "assets/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "layouts/**"
      - "static/**"
      - "config/_default/**"
      - "config.toml"
      - "hugo.toml"

  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Go (required for Hugo modules)
        uses: actions/setup-go@v5
        with:
          go-version: "1.19"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "0.157.0"
          extended: true

      - name: Install Hugo modules
        run: |
             hugo mod get
             hugo mod tidy

      - name: Build site
        run: hugo --minify

      - name: Show build output
        run: ls -R public

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_NICE_FIELD_0E3C5FD0F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "public"
          skip_app_build: true